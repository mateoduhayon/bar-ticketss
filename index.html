<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets Bar</title>
<style>
body {font-family: Arial; background:#f4f4f4; padding:20px;}
button {font-size:20px; padding:20px; margin:10px; border-radius:10px;}
.big {font-size:30px;}
</style>
</head>
<body>

<h1>Comptoir tickets</h1>

<button onclick="add('nova')">Bière Nova (2 + caution)</button>
<button onclick="add('ipa')">Bière IPA (3 + caution)</button>
<button onclick="add('fruit')">Bière fruitée (3 + caution)</button>
<button onclick="add('aperol')">Aperol (4 + caution)</button>

<h2>Retour caution</h2>
<button onclick="retour()">+1 retour</button>

<h2>Total</h2>
<div class="big" id="total">0 tickets</div>

<script>
let total=0;
let caution=0;

function add(type){
 if(type==="nova"){total+=2;caution+=1;}
 if(type==="ipa"){total+=3;caution+=1;}
 if(type==="fruit"){total+=3;caution+=1;}
 if(type==="aperol"){total+=4;caution+=1;}
 update();
}

function retour(){
 if(caution>0){caution-=1;}
 update();
}

function update(){
 document.getElementById("total").innerText = (total + caution) + " tickets";
}
</script>

</body>
</html>
